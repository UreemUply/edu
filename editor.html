<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Editor</title>
</head>
<body>

<textarea id="content"></textarea>
<button onclick="save()">저장</button>

<script>
let isSaved = false;

window.addEventListener('beforeunload', function(e){
  if(!isSaved){
    e.preventDefault();
    e.returnValue='';
  }
});

function save(){
  isSaved = true;
  alert('저장 완료');
  location.href='admin.html';
}
</script>

</body>
</html>
