<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Board Editor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --uplus-magenta:#e6007e;
    --uplus-dark:#2f2f35;
    --line:#e7e7ec;
    --bg:#f7f7fb;
    --card:#ffffff;
    --muted:#6f7480;
    --danger:#c53b58;
    --pending:#f1f3f5;
    --add:#eef8ff;
    --ok:#1b7f4a;
    --warn:#a86400;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:#222}
  .wrap{max-width:1180px;margin:0 auto;padding:20px}
  .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap}
  .title{font-size:24px;font-weight:800}
  .subtitle{font-size:13px;color:var(--muted);margin-top:4px}
  .row{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
  .col-main{flex:1 1 720px;min-width:0}
  .col-side{width:340px;max-width:100%;display:flex;flex-direction:column;gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 6px 16px rgba(0,0,0,.04)}
  .card-header{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
  .label{font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:700}
  .label-row{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:8px}
  .hint{font-size:12px;color:var(--muted)}
  input[type="text"], input[type="number"], textarea, select{width:100%;border:1px solid #d9dce3;border-radius:12px;padding:12px;font-size:14px;background:#fff}
  textarea{min-height:100px;resize:vertical}
  .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .btn{border:none;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}
  .btn-primary{background:var(--uplus-magenta);color:#fff}
  .btn-dark{background:var(--uplus-dark);color:#fff}
  .btn-light{background:#fff;border:1px solid #d9dce3;color:#333}
  .btn-danger{background:#fff1f4;border:1px solid #f0b7c5;color:var(--danger)}
  .btn-ghost{background:#f3f4f7;color:#333}
  .btn-ok{background:#edf8f1;border:1px solid #b6dfc7;color:var(--ok)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .editor{min-height:360px;border:1px solid #d9dce3;border-radius:14px;padding:14px;background:#fff;line-height:1.7}
  .editor:focus{outline:2px solid rgba(230,0,126,.15);border-color:#e7b0c7}
  .editor h2{font-size:22px;margin:1em 0 .55em}
  .editor p{margin:.7em 0}
  .editor ul,.editor ol{padding-left:20px;margin:.7em 0}
  .box-strong,.box-tip,.box-warn{padding:12px 14px;border-radius:12px;margin:10px 0}
  .box-strong{border:1px solid #e7b0c7;background:#fff1f7}
  .box-tip{border:1px solid #b9ddff;background:#eef7ff}
  .box-warn{border:1px solid #ffd0a8;background:#fff6ed}
  .image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .image-card{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff;position:relative}
  .image-card img{width:100%;height:110px;object-fit:cover;border-radius:10px;background:#f2f2f2}
  .image-card.pending-delete{background:var(--pending);opacity:.65}
  .image-card.pending-add{background:var(--add)}
  .image-card.thumbnail-card img{height:180px}
  .badge{position:absolute;top:8px;left:8px;background:var(--uplus-dark);color:#fff;font-size:11px;font-weight:700;padding:4px 8px;border-radius:999px}
  .badge.delete{background:#7a7d86}
  .badge.add{background:#1a76d2}
  .badge.keep{background:#2f2f35}
  .stack{display:flex;flex-direction:column;gap:8px}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .status{font-size:13px;color:var(--muted)}
  .status.ok{color:var(--ok)}
  .status.warn{color:var(--warn)}
  .status.danger{color:var(--danger)}
  .hidden{display:none !important}
  .pill{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:700}
  .footer{position:sticky;bottom:0;background:rgba(247,247,251,.92);backdrop-filter:blur(6px);padding-top:12px;margin-top:18px}
  .notice{padding:12px 14px;border-radius:12px;background:#f8f9fb;border:1px solid var(--line);font-size:13px;line-height:1.6;color:#444}
  @media (max-width:768px){
    .wrap{padding:14px}
    .title{font-size:20px}
    .editor{min-height:260px}
    .grid-2{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <div class="title">editor2 · 게시글 편집</div>
      <div id="editorPath" class="subtitle">불러오는 중...</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-light" type="button" onclick="goBack()">목록으로</button>
      <button class="btn btn-primary" type="button" onclick="savePost()">저장</button>
    </div>
  </div>

  <div class="row">
    <div class="col-main">
      <div class="card">
        <div class="grid-2">
          <div>
            <div class="label">대분류</div>
            <select id="boardTypeSelect"></select>
          </div>
          <div>
            <div class="label">카테고리</div>
            <select id="categorySelect"></select>
          </div>
        </div>

        <div style="height:12px"></div>
        <div class="grid-2">
          <div>
            <div class="label">제목</div>
            <input id="titleInput" type="text" placeholder="제목을 입력하세요" />
          </div>
          <div>
            <div class="label">요약문</div>
            <input id="summaryInput" type="text" placeholder="목록 카드에서 보일 요약문" />
          </div>
        </div>

        <div style="height:12px"></div>
        <div class="grid-2">          <div>
            <div class="label">정렬값</div>
            <input id="sortOrderInput" type="number" value="0" />
          </div>
        </div>

        <div style="height:12px"></div>
        <div class="grid-2">
          <label class="pill"><input id="pinnedCheckbox" type="checkbox" /> 상단고정</label>
        </div>
      </div>

      <div class="card" style="margin-top:16px;">
        <div class="card-header">
          <div>
            <div class="label" style="margin-bottom:2px;">썸네일 이미지</div>
            <div class="hint">필수 1장입니다. 목록 카드 대표 이미지로 사용됩니다.</div>
          </div>
          <label class="btn btn-dark" style="display:inline-flex;align-items:center;">
            썸네일 선택
            <input id="thumbnailInput" type="file" accept="image/*" class="hidden" />
          </label>
        </div>
        <div style="height:12px"></div>
        <div id="thumbnailWrap"></div>
      </div>

      <div class="card" style="margin-top:16px;">
        <div class="card-header">
          <div>
            <div class="label" style="margin-bottom:2px;">상단 이미지 슬라이더</div>
            <div class="hint">상세 화면 상단에서 좌우로 넘겨보는 이미지입니다. 없어도 저장 가능합니다.</div>
          </div>
          <label class="btn btn-dark" style="display:inline-flex;align-items:center;">
            + 이미지 추가
            <input id="imageInput" type="file" accept="image/*" multiple class="hidden" />
          </label>
        </div>
        <div style="height:12px"></div>
        <div id="imageGrid" class="image-grid"></div>
      </div>

      <div class="card" style="margin-top:16px;">
        <div class="label">본문</div>
        <div class="toolbar">
          <button class="btn btn-ghost" type="button" onclick="formatBlockTag('h2')">제목</button>
          <button class="btn btn-ghost" type="button" onclick="formatBlockTag('p')">본문</button>
          <button class="btn btn-ghost" type="button" onclick="execCmd('bold')">굵게</button>
          <button class="btn btn-ghost" type="button" onclick="execCmd('insertUnorderedList')">목록</button>
          <button class="btn btn-ghost" type="button" onclick="insertBlock('strong')">강조</button>
          <button class="btn btn-ghost" type="button" onclick="insertBlock('tip')">TIP</button>
          <button class="btn btn-ghost" type="button" onclick="insertBlock('warn')">주의</button>
        </div>
        <div id="editorText" class="editor" contenteditable="true"></div>
      </div>
    </div>

    <div class="col-side">
      <div class="card">
        <div class="label">저장 상태</div>
        <div id="saveStatus" class="status">변경 사항 없음</div>
      </div>

      <div class="card">
        <div class="label">현재 모드</div>
        <div id="modeStatus" class="notice">확인 중...</div>
      </div>

      <div class="card">
        <div class="label">구조 안내</div>
        <div class="notice">
          상단에는 이미지 슬라이더, 하단에는 본문이 노출됩니다.<br>
          썸네일은 목록 카드용 대표 이미지이며 필수입니다.<br>
          추천제안과 참고영상은 editor2에서 사용하지 않습니다.
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;">
      <button class="btn btn-light" type="button" onclick="goBack()">취소</button>
      <button class="btn btn-primary" type="button" onclick="savePost()">저장</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ytnxmnbctujuopbqpurl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4oBm89ecivuVF6StOBz7yg_qNBItC4z';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== editor2 DB / Storage 설정 =====
const TABLE_CATEGORIES = 'board_categories';
const TABLE_POSTS = 'board_posts';
const TABLE_IMAGES = 'board_post_images';
const STORAGE_BUCKET = 'board-assets';
const BOARD_TYPE_LABELS = {
  education_material: '교육자료',
  product_material: '상품자료',
  issue: '이슈사항'
};
const BOARD_TYPES = Object.keys(BOARD_TYPE_LABELS);

let currentPostId = null;
let editingMode = 'create';
let dirty = false;
let suppressBeforeUnload = false;
let categoryCache = [];

let draft = {
  board_type: 'education_material',
  category_id: '',
  title: '',
  summary: '',
  body_html: '',
  status: 'published',
  is_pinned: false,
  sort_order: 0,
  thumbnail: {
    mode: 'empty', // empty | keep | add | replace | delete
    url: '',
    path: '',
    file: null,
    deleteOld: false
  },
  images: []
};

function qs(key){
  return new URLSearchParams(window.location.search).get(key);
}

function setDirty(next = true){
  dirty = next;
  const el = document.getElementById('saveStatus');
  if (!el) return;
  if (next) suppressBeforeUnload = false;
  if (dirty) {
    el.textContent = '저장되지 않은 변경 사항이 있습니다.';
    el.className = 'status warn';
  } else {
    el.textContent = '변경 사항 없음';
    el.className = 'status ok';
  }
}

function bindDirtyEvents(){
  [
    'titleInput','summaryInput','sortOrderInput','pinnedCheckbox'
  ].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const eventName = (el.type === 'checkbox' || el.tagName === 'SELECT') ? 'change' : 'input';
    el.addEventListener(eventName, () => setDirty(true));
  });
  document.getElementById('boardTypeSelect').addEventListener('change', onBoardTypeChange);
  document.getElementById('categorySelect').addEventListener('change', () => { setDirty(true); updateEditorPath(); });
  document.getElementById('editorText').addEventListener('input', () => setDirty(true));
  document.getElementById('thumbnailInput').addEventListener('change', onThumbnailSelected);
  document.getElementById('imageInput').addEventListener('change', onImagesSelected);
}

async function init(){
  fillBoardTypeSelect();
  bindDirtyEvents();
  window.addEventListener('beforeunload', handleBeforeUnload);

  const idParam = qs('id');
  const boardTypeParam = normalizeBoardType(qs('board_type')) || 'education_material';
  const categoryParam = qs('category_id');
  currentPostId = idParam ? Number(idParam) : null;

  await loadCategories();

  if (currentPostId) {
    editingMode = 'edit';
    document.getElementById('modeStatus').textContent = '기존 게시글 수정 모드입니다. 저장 시 기존 데이터가 갱신됩니다.';
    await loadPost(currentPostId);
  } else {
    editingMode = 'create';
    document.getElementById('modeStatus').textContent = '새 게시글 작성 모드입니다. 저장 시 새 컨텐츠가 생성됩니다.';
    draft.board_type = boardTypeParam;
    document.getElementById('boardTypeSelect').value = boardTypeParam;
    populateCategorySelect(boardTypeParam, categoryParam ? Number(categoryParam) : null);
    updateEditorPath();
    renderAll();
    setDirty(false);
  }
}

function normalizeBoardType(value){
  return BOARD_TYPES.includes(value) ? value : null;
}

function fillBoardTypeSelect(){
  const select = document.getElementById('boardTypeSelect');
  select.innerHTML = BOARD_TYPES.map(type => `<option value="${type}">${BOARD_TYPE_LABELS[type]}</option>`).join('');
}

async function loadCategories(){
  const { data, error } = await supabaseClient
    .from(TABLE_CATEGORIES)
    .select('id, board_type, name, sort_order, is_visible')
    .eq('is_visible', true)
    .order('board_type', { ascending: true })
    .order('sort_order', { ascending: true })
    .order('id', { ascending: true });

  if (error) {
    console.error(error);
    alert('카테고리 목록을 불러오지 못했습니다. 테이블명 또는 컬럼 구성을 확인해주세요.');
    return;
  }
  categoryCache = Array.isArray(data) ? data : [];
}

function populateCategorySelect(boardType, selectedId = null){
  const select = document.getElementById('categorySelect');
  const rows = categoryCache.filter(item => item.board_type === boardType);
  if (!rows.length) {
    select.innerHTML = '<option value="">카테고리 없음</option>';
    select.value = '';
    return;
  }
  select.innerHTML = rows.map(item => `<option value="${item.id}">${escapeHtml(item.name)}</option>`).join('');
  if (selectedId && rows.some(item => Number(item.id) === Number(selectedId))) {
    select.value = String(selectedId);
  } else {
    select.value = String(rows[0].id);
  }
}

function onBoardTypeChange(){
  const nextType = normalizeBoardType(document.getElementById('boardTypeSelect').value) || 'education_material';
  draft.board_type = nextType;
  populateCategorySelect(nextType);
  setDirty(true);
  updateEditorPath();
}

async function loadPost(postId){
  const { data: post, error: postError } = await supabaseClient
    .from(TABLE_POSTS)
    .select('*')
    .eq('id', postId)
    .single();

  if (postError || !post) {
    console.error(postError);
    alert('게시글을 불러오지 못했습니다.');
    return;
  }

  const { data: images, error: imageError } = await supabaseClient
    .from(TABLE_IMAGES)
    .select('*')
    .eq('post_id', postId)
    .order('sort_order', { ascending: true })
    .order('id', { ascending: true });

  if (imageError) {
    console.error(imageError);
    alert('이미지 목록을 불러오지 못했습니다.');
    return;
  }

  draft.board_type = normalizeBoardType(post.board_type) || 'education_material';
  draft.category_id = post.category_id || '';
  draft.title = post.title || '';
  draft.summary = post.summary || '';
  draft.body_html = post.body_html || '';
  draft.status = 'published';
  draft.is_pinned = !!post.is_pinned;
  draft.sort_order = Number(post.sort_order || 0);
  draft.thumbnail = {
    mode: post.thumbnail_url ? 'keep' : 'empty',
    url: post.thumbnail_url || '',
    path: post.thumbnail_path || '',
    file: null,
    deleteOld: false
  };
  draft.images = (images || []).map(item => ({
    id: item.id,
    url: item.image_url,
    path: item.image_path || '',
    sort_order: Number(item.sort_order || 0),
    file: null,
    _status: 'keep'
  }));

  document.getElementById('boardTypeSelect').value = draft.board_type;
  populateCategorySelect(draft.board_type, draft.category_id);
  renderAll();
  updateEditorPath();
  setDirty(false);
}

function renderAll(){
  document.getElementById('titleInput').value = draft.title || '';
  document.getElementById('summaryInput').value = draft.summary || '';
  document.getElementById('sortOrderInput').value = Number(draft.sort_order || 0);
  document.getElementById('pinnedCheckbox').checked = !!draft.is_pinned;
  document.getElementById('editorText').innerHTML = draft.body_html || '';
  renderThumbnail();
  renderImages();
}

function renderThumbnail(){
  const wrap = document.getElementById('thumbnailWrap');
  const thumb = draft.thumbnail;
  if (!thumb || thumb.mode === 'empty' || thumb.mode === 'delete') {
    wrap.innerHTML = '<div class="notice">썸네일이 아직 없습니다. 저장하려면 1장을 반드시 등록해야 합니다.</div>';
    return;
  }

  let badge = '기존';
  let badgeClass = 'keep';
  if (thumb.mode === 'add' || thumb.mode === 'replace') {
    badge = '새 파일';
    badgeClass = 'add';
  }

  wrap.innerHTML = `
    <div class="image-card thumbnail-card ${thumb.mode === 'replace' || thumb.mode === 'add' ? 'pending-add' : ''}">
      <div class="badge ${badgeClass}">${badge}</div>
      <img src="${escapeHtml(thumb.url)}" alt="thumbnail" />
      <div class="actions">
        <label class="btn btn-light" style="display:inline-flex;align-items:center;">
          교체
          <input id="thumbnailInputInline" type="file" accept="image/*" class="hidden" />
        </label>
        <button class="btn btn-danger" type="button" onclick="markThumbnailDelete()">삭제</button>
      </div>
    </div>
  `;
  const inlineInput = document.getElementById('thumbnailInputInline');
  if (inlineInput) inlineInput.addEventListener('change', onThumbnailSelected);
}

function renderImages(){
  const grid = document.getElementById('imageGrid');
  const rows = draft.images || [];
  if (!rows.length) {
    grid.innerHTML = '<div class="notice">등록된 이미지가 없습니다. 이 영역은 비워둬도 저장할 수 있습니다.</div>';
    return;
  }

  grid.innerHTML = rows.map((item, index) => {
    const pendingDelete = item._status === 'delete';
    const pendingAdd = item._status === 'add';
    return `
      <div class="image-card ${pendingDelete ? 'pending-delete' : ''} ${pendingAdd ? 'pending-add' : ''}">
        <div class="badge ${pendingDelete ? 'delete' : pendingAdd ? 'add' : 'keep'}">${pendingDelete ? '삭제예정' : pendingAdd ? '새 파일' : index + 1}</div>
        <img src="${escapeHtml(item.url)}" alt="image-${index + 1}" />
        <div class="actions">
          <button class="btn btn-light" type="button" onclick="moveImage(${index}, -1)" ${index === 0 ? 'disabled' : ''}>앞으로</button>
          <button class="btn btn-light" type="button" onclick="moveImage(${index}, 1)" ${index === rows.length - 1 ? 'disabled' : ''}>뒤로</button>
          <button class="btn ${pendingDelete ? 'btn-light' : 'btn-danger'}" type="button" onclick="toggleImageDelete(${index})">${pendingDelete ? '삭제취소' : '삭제'}</button>
        </div>
      </div>
    `;
  }).join('');
}

function onThumbnailSelected(event){
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const hadExisting = !!draft.thumbnail.url && (draft.thumbnail.mode === 'keep' || draft.thumbnail.mode === 'replace');
  draft.thumbnail = {
    mode: hadExisting ? 'replace' : 'add',
    url,
    path: draft.thumbnail.path || '',
    file,
    deleteOld: !!hadExisting
  };
  renderThumbnail();
  setDirty(true);
  event.target.value = '';
}

function markThumbnailDelete(){
  draft.thumbnail.mode = 'delete';
  draft.thumbnail.file = null;
  renderThumbnail();
  setDirty(true);
}

function onImagesSelected(event){
  const files = Array.from(event.target.files || []);
  if (!files.length) return;
  files.forEach(file => {
    draft.images.push({
      id: null,
      url: URL.createObjectURL(file),
      path: '',
      sort_order: draft.images.length,
      file,
      _status: 'add'
    });
  });
  renderImages();
  setDirty(true);
  event.target.value = '';
}

function moveImage(index, direction){
  const target = index + direction;
  if (target < 0 || target >= draft.images.length) return;
  const clone = [...draft.images];
  [clone[index], clone[target]] = [clone[target], clone[index]];
  draft.images = clone;
  renderImages();
  setDirty(true);
}

function toggleImageDelete(index){
  const item = draft.images[index];
  if (!item) return;
  if (item._status === 'delete') {
    item._status = item.id ? 'keep' : 'add';
  } else if (item._status === 'add' && !item.id) {
    draft.images.splice(index, 1);
  } else {
    item._status = 'delete';
  }
  renderImages();
  setDirty(true);
}

function collectFormValues(){
  draft.board_type = normalizeBoardType(document.getElementById('boardTypeSelect').value) || 'education_material';
  draft.category_id = document.getElementById('categorySelect').value ? Number(document.getElementById('categorySelect').value) : null;
  draft.title = document.getElementById('titleInput').value.trim();
  draft.summary = document.getElementById('summaryInput').value.trim();
  draft.body_html = document.getElementById('editorText').innerHTML.trim();
  draft.status = 'published';
  draft.is_pinned = document.getElementById('pinnedCheckbox').checked;
  draft.sort_order = Number(document.getElementById('sortOrderInput').value || 0);
}

function validateDraft(){
  collectFormValues();

  if (!draft.category_id) {
    alert('카테고리를 선택해야 합니다.');
    return false;
  }
  if (!draft.title) {
    alert('제목을 입력해주세요.');
    return false;
  }
  const thumbMissing = !draft.thumbnail || draft.thumbnail.mode === 'empty' || draft.thumbnail.mode === 'delete' || !draft.thumbnail.url;
  if (thumbMissing) {
    alert('썸네일 이미지는 필수입니다.');
    return false;
  }
  if (!draft.body_html.replace(/<[^>]+>/g, '').trim() && !activeImageCount()) {
    alert('본문 또는 상단 이미지가 필요합니다.');
    return false;
  }
  return true;
}

function activeImageCount(){
  return draft.images.filter(item => item._status !== 'delete').length;
}

async function savePost(){
  if (!validateDraft()) return;
  draft.status = 'published';

  const saveStatus = document.getElementById('saveStatus');
  saveStatus.textContent = '저장 중...';
  saveStatus.className = 'status';

  try {
    const previousThumbPath = currentPostId ? (draft.thumbnail.deleteOld ? draft.thumbnail.path : '') : '';
    const previousImagePathsToDelete = [];

    const thumbnailInfo = await resolveThumbnailUpload();

    const payload = {
      board_type: draft.board_type,
      category_id: draft.category_id,
      title: draft.title,
      summary: draft.summary,
      body_html: draft.body_html,
      status: draft.status,
      is_visible: true,
      is_pinned: draft.is_pinned,
      sort_order: draft.sort_order,
      thumbnail_url: thumbnailInfo.url,
      thumbnail_path: thumbnailInfo.path
    };

    let savedId = currentPostId;
    if (savedId) {
      const { error } = await supabaseClient.from(TABLE_POSTS).update(payload).eq('id', savedId);
      if (error) throw error;
    } else {
      const { data, error } = await supabaseClient.from(TABLE_POSTS).insert(payload).select('id').single();
      if (error) throw error;
      savedId = data.id;
      currentPostId = savedId;
      editingMode = 'edit';
      document.getElementById('modeStatus').textContent = '기존 게시글 수정 모드입니다. 저장 시 기존 데이터가 갱신됩니다.';
    }

    const orderedImages = [];
    for (let index = 0; index < draft.images.length; index += 1) {
      const item = draft.images[index];
      if (item._status === 'delete') {
        if (item.path) previousImagePathsToDelete.push(item.path);
        if (item.id) {
          const { error } = await supabaseClient.from(TABLE_IMAGES).delete().eq('id', item.id);
          if (error) throw error;
        }
        continue;
      }

      let nextUrl = item.url;
      let nextPath = item.path || '';
      if (item.file) {
        const uploaded = await uploadAsset(item.file, draft.board_type, savedId, 'slides');
        nextUrl = uploaded.url;
        nextPath = uploaded.path;
        if (item.path) previousImagePathsToDelete.push(item.path);
      }

      const rowPayload = {
        post_id: savedId,
        image_url: nextUrl,
        image_path: nextPath,
        sort_order: orderedImages.length
      };

      if (item.id) {
        const { error } = await supabaseClient.from(TABLE_IMAGES).update(rowPayload).eq('id', item.id);
        if (error) throw error;
        orderedImages.push({ ...item, url: nextUrl, path: nextPath, sort_order: orderedImages.length, file: null, _status: 'keep' });
      } else {
        const { data, error } = await supabaseClient.from(TABLE_IMAGES).insert(rowPayload).select('id').single();
        if (error) throw error;
        orderedImages.push({ id: data.id, url: nextUrl, path: nextPath, sort_order: orderedImages.length, file: null, _status: 'keep' });
      }
    }

    if (previousThumbPath && previousThumbPath !== thumbnailInfo.path) {
      await safeRemoveFiles([previousThumbPath]);
    }
    if (previousImagePathsToDelete.length) {
      await safeRemoveFiles(previousImagePathsToDelete);
    }

    draft.images = orderedImages;
    draft.thumbnail = {
      mode: 'keep',
      url: thumbnailInfo.url,
      path: thumbnailInfo.path,
      file: null,
      deleteOld: false
    };

    suppressBeforeUnload = true;
    renderAll();
    updateEditorPath();
    setDirty(false);
    saveStatus.textContent = '저장 완료';
    saveStatus.className = 'status ok';

    const nextUrl = buildAdminUrl();
    suppressBeforeUnload = true;
    window.location.href = buildAdminUrl();
    return;
    window.__editor2_last_admin_url = nextUrl;
  } catch (error) {
    console.error(error);
    saveStatus.textContent = '저장 실패';
    saveStatus.className = 'status danger';
    alert(`저장 중 오류가 발생했습니다.\n${error.message || error}`);
  }
}

async function resolveThumbnailUpload(){
  const thumb = draft.thumbnail;
  if (thumb.mode === 'keep' && thumb.url) {
    return { url: thumb.url, path: thumb.path || '' };
  }
  if ((thumb.mode === 'add' || thumb.mode === 'replace') && thumb.file) {
    const postKey = currentPostId || 'new';
    const uploaded = await uploadAsset(thumb.file, draft.board_type, postKey, 'thumbnails');
    return uploaded;
  }
  throw new Error('썸네일이 비어 있습니다.');
}

async function uploadAsset(file, boardType, postKey, assetGroup){
  const safeName = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}_${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
  const path = `${boardType}/${postKey}/${assetGroup}/${safeName}`;
  const { error } = await supabaseClient.storage.from(STORAGE_BUCKET).upload(path, file, { upsert: false });
  if (error) throw error;
  const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(path);
  return { url: data.publicUrl, path };
}

async function safeRemoveFiles(paths){
  const clean = [...new Set(paths.filter(Boolean))];
  if (!clean.length) return;
  const { error } = await supabaseClient.storage.from(STORAGE_BUCKET).remove(clean);
  if (error) {
    console.warn('Storage remove warning:', error);
  }
}

function buildAdminUrl(){
  const params = new URLSearchParams();
  params.set('board_type', draft.board_type);
  if (draft.category_id) params.set('category_id', String(draft.category_id));
  if (currentPostId) params.set('open_post_id', String(currentPostId));
  return `admin.html?${params.toString()}`;
}

function goBack(){
  collectFormValues();
  if (dirty && !confirm('저장되지 않은 변경 사항이 있습니다. 목록으로 이동할까요?')) return;
  suppressBeforeUnload = true;
  window.location.href = window.__editor2_last_admin_url || buildAdminUrl();
}

function updateEditorPath(){
  const category = categoryCache.find(item => Number(item.id) === Number(document.getElementById('categorySelect').value || draft.category_id));
  const boardLabel = BOARD_TYPE_LABELS[draft.board_type || normalizeBoardType(document.getElementById('boardTypeSelect').value) || 'education_material'];
  const categoryLabel = category ? category.name : '카테고리 미선택';
  const modeLabel = editingMode === 'edit' ? `수정 #${currentPostId}` : '새 글 작성';
  document.getElementById('editorPath').textContent = `${boardLabel} / ${categoryLabel} / ${modeLabel}`;
}

function handleBeforeUnload(event){
  if (!dirty || suppressBeforeUnload) return;
  event.preventDefault();
  event.returnValue = '';
}

function execCmd(command){
  document.execCommand(command, false, null);
  document.getElementById('editorText').focus();
  setDirty(true);
}

function formatBlockTag(tag){
  document.execCommand('formatBlock', false, tag.toUpperCase());
  document.getElementById('editorText').focus();
  setDirty(true);
}

function placeCaretAtStart(node){
  const range = document.createRange();
  const sel = window.getSelection();
  range.selectNodeContents(node);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
}

function handleEditorKeydown(event){
  if (event.key !== 'Enter' || event.shiftKey) return;
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  let node = sel.anchorNode;
  if (!node) return;
  if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
  const box = node && node.closest ? node.closest('.box-tip, .box-warn, .box-strong') : null;
  if (!box) return;
  event.preventDefault();
  const p = document.createElement('p');
  p.innerHTML = '<br>';
  box.insertAdjacentElement('afterend', p);
  placeCaretAtStart(p);
  setDirty(true);
}

function insertBlock(type){
  const editor = document.getElementById('editorText');
  const className = type === 'tip' ? 'box-tip' : type === 'warn' ? 'box-warn' : 'box-strong';
  const text = type === 'tip' ? 'TIP 내용을 입력하세요.' : type === 'warn' ? '주의 내용을 입력하세요.' : '강조 내용을 입력하세요.';
  const box = document.createElement('div');
  box.className = className;
  box.textContent = text;
  const p = document.createElement('p');
  p.innerHTML = '<br>';
  const sel = window.getSelection();
  if (sel && sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.deleteContents();
    range.insertNode(p);
    range.insertNode(box);
  } else {
    editor.appendChild(box);
    editor.appendChild(p);
  }
  editor.focus();
  placeCaretAtStart(p);
  setDirty(true);
}

function escapeHtml(value){
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

document.getElementById('editorText').addEventListener('keydown', handleEditorKeydown);
init();
</script>
