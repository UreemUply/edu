<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body {font-family:sans-serif;}
.modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:9999;}
.modal img {max-width:90%;max-height:90%;}
.modal .close {position:absolute;top:20px;right:20px;color:#fff;font-size:24px;cursor:pointer;}
</style>
</head>
<body>

<div id="contentArea"></div>

<div id="imageModal" class="modal" onclick="closeModal(event)">
  <span class="close" onclick="closeModal(event)">X</span>
  <img id="modalImg">
</div>

<script>
function openImage(src){
  const modal = document.getElementById('imageModal');
  document.getElementById('modalImg').src = src;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal(e){
  e.stopPropagation();
  document.getElementById('imageModal').style.display = 'none';
  document.body.style.overflow = '';
}

function renderContent(html){
  document.getElementById('contentArea').innerHTML = html;
}
</script>

</body>
</html>
