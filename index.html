<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" id="viewport-meta" name="viewport"/>
<title>유림텔레콤 Class</title>
<meta property="og:type" content="website"/>
<meta property="og:title" content="유림텔레콤 Class"/>
<meta property="og:description" content="임직원 역량 강화를 위한 교육 플랫폼"/>
<meta property="og:url" content="https://ureemuply.github.io/edu">
<meta property="og:image" content="https://ytnxmnbctujuopbqpurl.supabase.co/storage/v1/object/public/board-assets/og%20image.png"/>
<style>
        /* 기본 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
        :root { --uplus-magenta: #e6007e; --uplus-dark: #222222; --border-light: #e5e5e5; --bg-light: #f3f4f8; }
        
        /* 화면 전체 줌 방지 적용 (모바일 터치 액션 제한) */
        body { background-color: var(--bg-light); color: #111; min-height: 100vh; padding-bottom: 0; overflow-x: hidden; touch-action: pan-x pan-y; }

        /* 페이지 전환 */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .page { display: none; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 로그인/회원가입 스타일 */
        .login-wrap { display: flex; flex-direction: column; justify-content: center; min-height: 90vh; }
        .login-logo-box { text-align: center; margin-bottom: 40px; }
        .login-logo-box .logo { font-size: 28px; font-weight: 800; color: var(--uplus-magenta); margin-bottom: 10px; }
        .login-logo-box .logo span { color: var(--uplus-magenta); }
        .login-logo-box p { color: #666; font-size: 14px; }
        .form-box { background: #fff; padding: 32px 24px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .form-input { width: 100%; padding: 16px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; outline: none; background: #fff; }
        .form-input:focus { border-color: var(--uplus-magenta); }
        select.form-input { color: #555; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 16px center; background-size: 16px; }
        .form-label { font-size: 13px; font-weight: 700; color: var(--uplus-dark); margin-bottom: 6px; display: block; margin-top: 10px; }
        .primary-btn { width: 100%; padding: 16px; background: var(--uplus-magenta); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; margin-bottom: 20px; transition: 0.2s; }
        .login-links { text-align: center; font-size: 13px; color: #888; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .login-links span { cursor: pointer; padding: 0 4px; }
        .login-links span:hover { color: var(--uplus-magenta); }
        .login-links .signup { color: var(--uplus-dark); font-weight: 700; }

    </style>
</head>
<body>
<div class="page active container" id="page-login">
<div class="login-wrap">
<div class="login-logo-box">
<div class="logo">유림텔레콤 <span>Class</span></div>
<p>임직원 역량 강화를 위한 교육 플랫폼</p>
</div>
<div class="form-box">
<label class="form-label">비밀번호</label>
<input class="form-input" id="password" type="password" placeholder="비밀번호를 입력해주세요"/>
<button class="primary-btn" onclick="enterFront()">입장</button>
<div class="login-links" style="justify-content:space-between; gap:12px; flex-wrap:wrap;">

<span class="admin-login" onclick="doAdminLogin()" style="color:#888;">관리자모드 진입</span>
</div>
</div>
</div>
</div>

<div id="template-page-notice-policy" style="display:none;">
<div class="detail-img-box" style="position:relative;">
<img alt="이미지" src="https://images.unsplash.com/photo-1555774698-0b77e0d5fac6?q=80&amp;w=600"/>
<div class="admin-only" style="position:absolute; top:10px; right:10px;">
<input accept="image/*" class="file-upload" onchange="changeDynamicDetailImage(event, this)" style="display:none;" type="file"/>
<button class="btn-admin edit" onclick="this.previousElementSibling.click()">이미지 변경</button>
</div>
</div>
<div class="content-text-box">내용을 입력하세요. 자유롭게 편집 가능합니다.</div>
</div>
<div id="template-page-content" style="display:none;">
<div class="slider-container">
<div class="slider-wrapper content-slider">
<div class="slider-item"><img class="slider-img" src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&amp;w=600"/><span class="admin-only img-delete-overlay" onclick="deleteSliderImage(event, this)">삭제</span></div>
<div class="admin-only admin-add-img-btn" onclick="document.querySelector('#page-content-dynamic-area .file-upload').click()">+ 이미지 첨부</div>
</div>
<div class="slider-dots content-dots"></div>
<input accept="image/*" class="file-upload" onchange="handleSliderImageUpload(event, false)" style="display:none;" type="file"/>
</div>
<div class="content-text-box"><strong style="color: var(--uplus-magenta);">[학습 목표]</strong><br/>해당 섹션의 기본기를 마스터하고 현장에 바로 적용할 수 있도록 숙지합니다.</div>
<div class="recommend-area"><div class="recommend-title">💡 추천 제안 <button class="admin-only btn-admin edit" onclick="addKeyword()" style="margin-left:10px;">+ 키워드 추가</button></div><div class="keyword-list content-keyword-list"></div></div>
</div>
<div id="template-page-fullscreen" style="display:none;">
<div class="fullscreen-viewer">
<div class="fs-slider fs-slider">
<div class="fs-item" style="position:relative;"><img alt="img1" src="https://images.unsplash.com/photo-1555774698-0b77e0d5fac6?q=80&amp;w=600"/><span class="admin-only img-delete-overlay" onclick="deleteFullscreenImage(event, this)">삭제</span></div>
</div>
<input accept="image/*" class="file-upload" onchange="handleSliderImageUpload(event, true)" style="display:none;" type="file"/>
</div>
<div class="fs-dots fs-dots"></div>
<div class="content-text-box">해당 자료의 텍스트 설명이 표시됩니다. 자유롭게 편집하세요.</div>
</div>





<div id="image-zoom-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; justify-content:center; align-items:center; flex-direction:column;">
<div onclick="closeZoomModal()" style="position:absolute; top:20px; right:20px; color:#fff; font-size:36px; font-weight:bold; cursor:pointer; z-index:10001; line-height:1; padding:10px;">×</div>
<div style="width:100%; height:100%; overflow:auto; display:flex; justify-content:center; align-items:center;">
<img id="zoomed-image" src="" style="max-width:100%; height:auto;"/>
</div>
</div>
<nav class="bottom-nav" style="display: none;">
<div class="nav-item active" onclick="goHome()"><span class="nav-icon">⌂</span>메인</div>
<div class="nav-item" onclick="goToPage('page-edu', 1)"><span class="nav-icon">⚑</span>신입교육</div>
<div class="nav-item" onclick="goToPage('page-materials-list', 2, '교육자료')"><span class="nav-icon">❏</span>교육자료</div>
<div class="nav-item" onclick="goToPage('page-product-list', 3, '상품자료')"><span class="nav-icon">⊞</span>상품자료</div>
<div class="nav-item" onclick="goToPage('page-issues-list', 4, '이슈사항')"><span class="nav-icon">⚠</span>이슈사항</div>
<div class="nav-item" onclick="goToPage('page-policy', 5)"><span class="nav-icon">☰</span>정책</div>
<div class="nav-item" onclick="openTestUrl()"><span class="nav-icon">✎</span>테스트</div>
</nav>
<script>
        // [줌 방지] iOS 및 일부 브라우저 터치 줌 완벽 제어
        let isZoomAllowed = false;
        document.addEventListener('touchstart', function(event) {
            if(event.touches.length > 1 && !isZoomAllowed) event.preventDefault();
        }, { passive: false });
        document.addEventListener('touchmove', function(event) {
            if(event.touches.length > 1 && !isZoomAllowed) event.preventDefault();
        }, { passive: false });

        window.onload = function() {
            history.replaceState({ pageId: 'page-login', navIndex: -1 }, "", "#login");
            document.body.style.paddingBottom = '0'; 
            syncNoticesToHome(); 
            updateStoreDropdowns(); 
            renderStoreAdminList(); 
        };

        window.addEventListener('popstate', function(event) {
            if (event.state) {
                showPageOnly(event.state.pageId);
                if (event.state.titleText) {
                    if(document.getElementById('materials-title')) document.getElementById('materials-title').innerText = event.state.titleText;
                    if(document.getElementById('notice-detail-title')) document.getElementById('notice-detail-title').innerText = event.state.titleText;
                    if(document.getElementById('policy-detail-title')) document.getElementById('policy-detail-title').innerText = event.state.titleText;
                    if(document.getElementById('content-title')) document.getElementById('content-title').innerText = event.state.titleText;
                    if(document.getElementById('viewer-title')) document.getElementById('viewer-title').innerText = event.state.titleText;
                }
                if (event.state.navIndex !== undefined && event.state.navIndex !== -1) {
                    activateBottomNav(event.state.navIndex);
                }
            } else {
                showPageOnly('page-login');
            }
        });

        function showPageOnly(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);

            if(pageId === 'page-login' || pageId === 'page-signup') {
                document.querySelector('.bottom-nav').style.display = 'none';
                document.body.style.paddingBottom = '0';
            } else {
                document.querySelector('.bottom-nav').style.display = 'flex';
                document.body.style.paddingBottom = '80px';
            }
        }

        function updateUserNameUI() {
            let displayStr = isAdmin ? currentUserName + " (관리자)" : currentUserName;
            document.getElementById('logged-user-name').innerText = displayStr;
            document.getElementById('mypage-user-name').innerText = displayStr;
        }

        function handleProfileClick() {
            if(isAdmin) goToPage('page-admin-members', -1);
            else goToPage('page-mypage', -1);
        }

        function doLogout() {
            window.location.href = 'index.html';
        }

        function enterFront(){
            const pw = document.getElementById('password').value;

            if(!pw){
            alert('비밀번호를 입력해주세요');
            return;
         }

            if(pw === '2012'){
             location.href = 'front.html#home';
            } else {
              alert('비밀번호가 틀렸습니다');
             }
             
        }
        function doAdminLogin() {
            const password = prompt('관리자모드 비밀번호를 입력하세요.');
            if (password === null) return;
            if (password !== '9999') {
                alert('비밀번호가 올바르지 않습니다.');
                return;
            }
            window.location.href = 'admin.html#home';
        }
document.addEventListener('DOMContentLoaded', function () {
  const passwordInput = document.getElementById('password');
  if (!passwordInput) return;

  passwordInput.addEventListener('keydown', function (event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      enterFront();
    }
  });
});
        function goHome() {
            syncNoticesToHome(); 
            showPageOnly('page-home');
            activateBottomNav(0);
            history.pushState({ pageId: 'page-home', navIndex: 0 }, "", "#home");
        }

        function goToPage(pageId, navIndex, titleText) {
            if(pageId === 'page-home') syncNoticesToHome();
            showPageOnly(pageId);
            if(titleText) {
                if(document.getElementById('materials-title')) document.getElementById('materials-title').innerText = titleText;
            }
            if(navIndex !== undefined && navIndex !== -1) {
                activateBottomNav(navIndex);
            }
            history.pushState({ pageId: pageId, navIndex: navIndex, titleText: titleText }, "", "#" + pageId);
        }

        function activateBottomNav(index) {
            let items = document.querySelectorAll('.bottom-nav .nav-item');
            items.forEach(item => item.classList.remove('active'));
            if(index >= 0 && index < items.length) {
                items[index].classList.add('active');
            }
        }

        function openZoomModal(src) {
            document.getElementById('zoomed-image').src = src;
            document.getElementById('image-zoom-modal').style.display = 'flex';
            isZoomAllowed = true;
            document.getElementById('viewport-meta').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes');
        }

        function closeZoomModal() {
            document.getElementById('image-zoom-modal').style.display = 'none';
            isZoomAllowed = false;
            document.getElementById('viewport-meta').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
        }
    </script>
</body>
</html>
